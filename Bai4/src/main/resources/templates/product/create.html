<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="_layout">

<body>
    <div layout:fragment="content">

        <h3 class="page-title">➕ Create Product</h3>

        <div class="card col-md-6 mx-auto">
            <div class="card-header">Product Information</div>

            <div class="card-body p-4">
                <form th:action="@{/products/create}" th:object="${product}" method="post"
                    enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input th:field="*{name}" class="form-control">
                        <div class="text-danger" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" th:field="*{price}" class="form-control">
                        <div class="text-danger" th:errors="*{price}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Image</label>
                        <input type="file" name="imageProduct" class="form-control" accept="image/*"
                            onchange="previewCreateImage(event)">
                    </div>

                    <img id="previewCreate" class="img-preview d-none">

                    <div class="mb-4">
                        <label class="form-label">Category</label>
                        <select name="category.id" class="form-select">
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">
                            </option>
                        </select>
                    </div>

                    <button class="btn btn-success w-100">
                        💾 Save Product
                    </button>
                </form>
            </div>
        </div>

    </div>
</body>

<script>
function previewCreateImage(event) {
    const img = document.getElementById("previewCreate");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.classList.remove("d-none");
}
</script>

</html>
