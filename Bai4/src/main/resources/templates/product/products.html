<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="_layout">

<body>
    <div layout:fragment="content" class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>📦 Product List</h3>
            <a th:href="@{/products/create}" class="btn btn-primary">
                ➕ Create New Product
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">

                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Image</th>
                            <th>Category</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="p : ${listproduct}">
                            <td th:text="${p.id}"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.price}"></td>
                            <td>
                                <img th:if="${p.image != null}" th:src="@{/images/{img}(img=${p.image})}" width="90"
                                    class="rounded border">
                            </td>
                            <td th:text="${p.category?.name}"></td>
                            <td class="text-center">
                                <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">
                                    ✏️ Edit
                                </a>
                                <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post"
                                    style="display:inline">
                                    <button class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this product?')">
                                        🗑 Delete
                                    </button>
                                </form>
                            </td>
                            <td>
                                <span class="category-badge category-mobile" th:text="${p.category.name}">
                                </span>
                            </td>

                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>
</body>

</html>
