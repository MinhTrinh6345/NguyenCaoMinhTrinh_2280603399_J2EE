<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="_layout">

<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>

<body>
    <div layout:fragment="content" class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-warning text-dark rounded-top-4">
                        <h3 class="page-title">✏ Edit Product</h3>
                    </div>

                    <div class="card-body p-4">

                        <form th:action="@{/products/edit}" th:object="${product}" method="post"
                            enctype="multipart/form-data">

                            <!-- hidden id -->
                            <input type="hidden" th:field="*{id}" />

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Name</label>
                                <input type="text" th:field="*{name}" class="form-control"
                                    placeholder="Enter product name">
                                <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                </div>
                            </div>

                            <!-- Price -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Price</label>
                                <input type="number" th:field="*{price}" class="form-control" placeholder="Enter price">
                                <div class="text-danger small" th:if="${#fields.hasErrors('price')}"
                                    th:errors="*{price}">
                                </div>
                            </div>

                            <!-- Current Image -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Current Image</label>
                                <div class="border rounded p-2 text-center">
                                    <img th:src="@{'/images/' + ${product.image}}" id="previewEdit"
                                        class="img-preview mb-3">
                                    <p th:if="${product.image == null}" class="text-muted mb-0">No image</p>
                                </div>
                            </div>

                            <!-- Upload new image -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Upload New Image</label>
                                <input type="file" name="imageProduct" class="form-control" accept="image/*"
                                    onchange="previewEditImage(event)">
                                <small class="text-muted">
                                    Leave empty if you don't want to change image
                                </small>
                            </div>

                            <!-- Category -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Category</label>
                                <select class="form-select" name="category.id">
                                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                        th:selected="${product.category != null and c.id == product.category.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-success px-4">
                                    💾 Update
                                </button>
                                <a th:href="@{/products}" class="btn btn-outline-secondary">
                                    ❌ Cancel
                                </a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</body>
<script>
function previewEditImage(event) {
    const img = document.getElementById("previewEdit");
    img.src = URL.createObjectURL(event.target.files[0]);
}
</script>
</html>
