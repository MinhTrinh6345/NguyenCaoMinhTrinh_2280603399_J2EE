<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiemtra Shop - Thanh toán</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-hover: #764ba2;
            --bg-color: #f8f9fa;
            --nav-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .navbar {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,249,250,0.95));
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.02em;
            font-family: 'Poppins', sans-serif;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 30px;
            align-items: start;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            padding: 32px;
            border: 1px solid var(--border-color);
        }

        .card h3 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 700;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 24px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background-color: white;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-checkout {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .btn-checkout::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.3s ease;
        }

        .btn-checkout:hover::before {
            left: 100%;
        }

        .btn-checkout:active {
            transform: scale(0.98);
        }

        .btn-checkout:hover {
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }

        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .summary-list li {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 15px;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .summary-list li:last-child {
            border-bottom: none;
        }

        .item-name {
            color: var(--text-main);
            font-weight: 600;
            flex: 1;
        }

        .item-price {
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
        }

        .total-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .total-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Poppins', sans-serif;
        }

        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--success), var(--success), var(--primary), var(--border-color));
            z-index: 0;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .step.active .step-circle {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: var(--primary);
            color: white;
        }

        .step.completed .step-circle {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .step-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step.active .step-label,
        .step.completed .step-label {
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .progress-steps {
                margin-bottom: 30px;
            }

            .progress-steps::before {
                left: 20px;
                right: 20px;
            }

            .card {
                padding: 24px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/products/search}" class="brand">✨ Kiemtra Shop</a>
            <div>
                <a th:href="@{/cart}" style="color: var(--text-muted); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">← Trở về Giỏ hàng</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>🛒 Xác Nhận Đặt Hàng</h1>

        <div class="progress-steps">
            <div class="step completed">
                <div class="step-circle">✓</div>
                <div class="step-label">Giỏ Hàng</div>
            </div>
            <div class="step active">
                <div class="step-circle">2</div>
                <div class="step-label">Thanh Toán</div>
            </div>
            <div class="step">
                <div class="step-circle">3</div>
                <div class="step-label">Hoàn Tất</div>
            </div>
        </div>

        <div class="checkout-grid">
            <!-- Form -->
            <div class="card">
                <h3>📍 Địa Chỉ Giao Hàng</h3>
                <form th:action="@{/cart/checkout}" method="post">
                    <div class="form-group">
                        <label for="name">Họ và tên người nhận</label>
                        <input type="text" id="name" name="customerName" required placeholder="Ví dụ: Nguyễn Văn A" />
                    </div>
                    <div class="form-group">
                        <label for="phone">Số điện thoại liên hệ</label>
                        <input type="tel" id="phone" name="phone" required placeholder="Ví dụ: 0987123456" />
                    </div>
                    <div class="form-group">
                        <label for="address">Địa chỉ nhận hàng</label>
                        <input type="text" id="address" name="address" required placeholder="Số nhà, đường, phường, quận/huyện..." />
                    </div>

                    <button type="submit" class="btn-checkout">✓ Hoàn Tất Thanh Toán</button>
                </form>
            </div>

            <!-- Summary -->
            <div class="card">
                <h3>📋 Tóm Tắt Đơn Hàng</h3>
                <ul class="summary-list">
                    <li th:each="item : ${cartItems}">
                        <span class="item-name">
                            <span th:text="${item.product.name}">Sản phẩm</span>
                            <span th:text="'(x' + ${item.quantity} + ')'"></span>
                        </span>
                        <span class="item-price" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' $'">0.0</span>
                    </li>
                </ul>
                <div class="total-box">
                    <span class="total-title">💰 Tổng Cộng</span>
                    <span class="total-amount" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' $'">0.0</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
